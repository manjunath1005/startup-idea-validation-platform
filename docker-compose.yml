version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: startup-validation-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: startup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: startup-validation-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/startup_db
      - SECRET_KEY=your_jwt_signing_key_secret_for_local_runs_1234567890
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/backend
      - /backend/node_modules # prevent overwriting container-side python libraries if any or just general exclusions
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: startup-validation-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules # exclude node_modules from local overwrite
    environment:
      - CHOKIDAR_USEPOLLING=true # force file watch updates on Windows hosts
    depends_on:
      - backend

volumes:
  postgres_data:
